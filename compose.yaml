#key-value pairs
services:
  #dockers compose expects services

  backend:
    #custom key name
    ports:
      - 9090:9000
    #image: python:latest
    build:
      dockerfile: Dockerfile
      context: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 9000 
    # volumes:
    #   - ./backend/src:/app
    develop:
      watch:
        - action: rebuild 
          path: backend/requirements.txt
        - action: rebuild 
          path: backend/Dockerfile
        - action: restart
          path: backend/src/
          # target: /app   #when action:async 
  static_html:
    #custom key name
    ports:
      - 8000:8000
      - 3000:8000
    #image: python:latest
    build:
      dockerfile: static.Dockerfile
      context: ./static_html
    command: python -m http.server 8000
    volumes:
      - ./static_html/src:/app
